<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Production Execution Queue</title>
    <link rel="stylesheet" href="public/shared/css/style.css" />
    <style>
      /* Module-specific layout using existing style patterns */
      html,
      body {
        height: 100%;
        margin: 0;
        font-family:
          system-ui,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
        padding: 14px;
      }
      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }
      .page-header h1 {
        margin: 0;
        color: var(--primary);
      }
      .page-sub {
        color: var(--muted, #6b7280);
        font-size: 0.95rem;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 8px;
      }
      .kpi-strip {
        display: flex;
        gap: 8px;
        margin: 12px 0;
        flex-wrap: wrap;
      }
      .kpi {
        background: var(--panel-bg, #fff);
        border: 1px solid var(--border, #e5e7eb);
        padding: 8px 12px;
        border-radius: 8px;
        min-width: 120px;
      }
      /* Table cell alignment helpers */
      .c-center { text-align: center; }
      .c-left { text-align: left; }
      .c-right { text-align: right; }
      /* Status chips */
      .chip {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 0.85rem;
        color: #fff;
        font-weight: 600;
      }
      .chip.green { background: #16a34a; }
      .chip.amber { background: #f59e0b; }
      .chip.red { background: #ef4444; }
      .chip.blue { background: #3b82f6; }
      .chip.gray { background: #6b7280; }
      .lens-pills {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .pill {
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--border, #e5e7eb);
        background: var(--panel-bg);
        cursor: pointer;
      }
      .pill.active {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }
      .main {
        display: flex;
        flex: 1 1 auto;
        gap: 12px;
        min-height: 0;
      }
      .table-card {
        flex: 1 1 0;
        overflow: auto;
        border: 1px solid var(--border, #e5e7eb);
        border-radius: 8px;
        padding: 8px;
        background: var(--panel-bg);
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead th {
        position: sticky;
        top: 0;
        background: var(--table-header, #fafafa);
        z-index: 3;
        padding: 8px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }
      tbody td {
        padding: 8px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.04);
      }
      tr.clickable {
        cursor: pointer;
      }
      /* Right-side details drawer */
      .drawer {
        width: 360px;
        flex: 0 0 360px;
        border: 1px solid var(--border, #e5e7eb);
        border-radius: 8px;
        padding: 12px;
        background: var(--panel-bg);
        overflow: auto;
      }
      .drawer.hidden {
        display: none;
      }
      .drawer .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
      }
      .drawer .tab {
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid var(--border);
        cursor: pointer;
      }
      .drawer .tab.active {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }
      /* Mobile: drawer becomes slide-over */
      @media (max-width: 800px) {
        body {
          padding: 8px;
        }
        .main {
          flex-direction: column;
        }
        /* On small screens, show drawer as block below table instead of slide-over */
        .drawer {
          position: static;
          width: 100%;
          max-width: 100%;
          transform: none;
          transition: none;
          z-index: auto;
          display: none;
        }
        .drawer.open {
          display: block;
        }
      }
      .status {
        padding: 12px;
        color: var(--muted);
      }
      .controls {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .search {
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      /* Hide HOME label on small screens to match stock-checker behavior */
      #homeBtn .home-label {
        display: inline;
      }
      @media (max-width: 520px) {
        #homeBtn .home-label {
          display: none;
        }
        #homeBtn svg {
          margin-right: 0;
        }
        #homeBtn {
          padding-left: 8px;
          padding-right: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="header-card" style="border:1px solid var(--border);padding:12px;border-radius:8px;background:var(--panel-bg);">
      <div class="page-header">
        <div>
          <h1>Production Execution Queue</h1>
          <div class="page-sub" id="subtitle">
            Ranked current-month batch priorities for production execution
          </div>
          <div class="toolbar">
            <div class="controls">
              <button id="refreshBtn" class="pill">Refresh</button>
              <input
                id="searchBox"
                class="search"
                placeholder="Search batch, product ID, or item"
              />
            </div>
          </div>
        </div>
        <div style="text-align: right">
        <button id="homeBtn" type="button" title="Home" aria-label="Home">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9,22 9,12 15,12 15,22" />
          </svg>
          <span class="home-label">HOME</span>
        </button>
        <div id="rowCount">Rows: —</div>
        <div id="lastRefreshed" class="page-sub">Last refreshed: —</div>
      </div>
    </div>

    <div class="card kpi-row" style="margin-top:12px;padding:12px;border-radius:8px;background:var(--panel-bg);border:1px solid var(--border);">
      <div class="kpi-strip" id="kpiStrip">
        <!-- KPIs injected here -->
      </div>
    </div>

    <div class="card" style="margin-top:12px;padding:10px;border-radius:8px;background:var(--panel-bg);border:1px solid var(--border);">
      <div class="lens-pills" id="lensPills">
        <!-- Lens pills injected here -->
      </div>
    </div>

    <div class="main">
      <div class="table-card">
        <div id="statusArea" class="status">Loading…</div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
          <div>
            <label for="pageSize">Page size:</label>
            <select id="pageSize">
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="100">100</option>
              <option value="200">200</option>
            </select>
          </div>
          <div>
            <button id="exportCsv" class="pill">Export CSV</button>
            <span id="paginationInfo" style="margin-left:12px"></span>
            <button id="prevPage" class="pill" style="margin-left:8px">Prev</button>
            <button id="nextPage" class="pill" style="margin-left:6px">Next</button>
          </div>
        </div>
        <div id="tableWrap" style="display: none; overflow:auto">
          <table id="mainTable">
            <thead>
              <tr>
                <th class="c-center" style="width:80px">Rank</th>
                <th class="c-center">Batch</th>
                <th class="c-left">Product ID</th>
                <th class="c-left">Item</th>
                <th class="c-center">State</th>
                <th class="c-center">Execution Status</th>
                <th class="c-center">PM</th>
                <th class="c-center">RM</th>
                <th class="c-right">Risk Reduction</th>
                <th class="c-center">Top Region</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>

      <aside class="drawer hidden" id="detailsDrawer" aria-hidden="true">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
          "
        >
          <strong id="drawerTitle">Details</strong>
          <button id="drawerClose" class="pill">Close</button>
        </div>
        <div class="tabs" id="drawerTabs">
          <div class="tab active" data-tab="details">Details</div>
          <div class="tab" data-tab="why">Why it matters</div>
          <div class="tab" data-tab="pm">PM blockers</div>
          <div class="tab" data-tab="rm">RM blockers</div>
        </div>
        <div id="drawerContent">Select a row to view details.</div>
      </aside>
    </div>

    <script type="module" src="js/production-execution-queue.js"></script>
  </body>
</html>
