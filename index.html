<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>SASV WORKSPACE</title>
    <link rel="stylesheet" href="public/shared/css/style.css" />
    <style>
      :root {
        --sasv-primary: #005a8d;
        --sasv-primary-dark: #004876;
        --sasv-bg: #f3f6f9;
        --sasv-surface: #ffffff;
        --sasv-surface-soft: #f8fafc;
        --sasv-border: rgba(15, 23, 42, 0.08);
        --sasv-text: #1e293b;
        --sasv-text-soft: #334155;
        --sasv-muted: #64748b;
        --sasv-shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.035);
        --sasv-shadow-md: 0 6px 16px rgba(15, 23, 42, 0.06);
        --sasv-radius-md: 12px;
        --sasv-radius-lg: 16px;
      }

      [data-theme="dark"] {
        --sasv-bg: #181c22;
        --sasv-surface: #242a31;
        --sasv-surface-soft: rgba(255, 255, 255, 0.055);
        --sasv-border: rgba(255, 255, 255, 0.08);
        --sasv-text: #e5e7eb;
        --sasv-text-soft: #cbd5e1;
        --sasv-muted: #a8b3c2;
        --sasv-shadow-sm: none;
        --sasv-shadow-md: 0 6px 18px rgba(0, 0, 0, 0.24);
      }

      /* ── Soft Modern ERP Home Page ── */
      body {
        overflow-x: hidden;
        padding-top: 0 !important;
        background:
          radial-gradient(
            circle at 18% 0%,
            rgba(0, 90, 141, 0.045),
            transparent 32%
          ),
          linear-gradient(180deg, #f7f9fb 0%, var(--sasv-bg) 42%);
        font-family:
          "Inter",
          "Segoe UI",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Roboto",
          "Helvetica Neue",
          Arial,
          sans-serif;
        font-size: 14px;
        letter-spacing: 0;
      }
      [data-theme="dark"] body,
      body[data-theme="dark"] {
        background:
          radial-gradient(
            circle at 18% 0%,
            rgba(125, 211, 252, 0.055),
            transparent 34%
          ),
          linear-gradient(180deg, #1c2229 0%, var(--sasv-bg) 44%);
      }

      header {
        position: sticky;
        top: 0;
        z-index: 500;
        display: flex !important;
        align-items: center;
        gap: 18px;
        min-height: 64px;
        padding: 0 24px;
        background: rgba(255, 255, 255, 0.96) !important;
        border-bottom: 1px solid var(--sasv-border);
        box-shadow: 0 2px 14px rgba(15, 23, 42, 0.06);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        text-align: left !important;
        margin-bottom: 0 !important;
      }

      [data-theme="dark"] header {
        background: rgba(36, 42, 49, 0.94) !important;
        border-bottom-color: var(--sasv-border);
        box-shadow: 0 2px 16px rgba(0, 0, 0, 0.22);
      }

      #brand-zone {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        text-decoration: none;
        min-width: 220px;
      }
      #app-logo {
        height: 40px;
        width: 40px;
        border-radius: var(--sasv-radius-md);
        object-fit: cover;
        flex-shrink: 0;
        box-shadow: 0 1px 6px rgba(15, 23, 42, 0.12);
      }
      #brand-text {
        display: flex;
        flex-direction: column;
        line-height: 1.05;
        gap: 4px;
      }
      #brand-name {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.025em;
        white-space: nowrap;
        text-transform: uppercase;
      }
      #brand-name .brand-sasv {
        color: var(--sasv-primary);
      }
      #brand-name .brand-workspace {
        color: var(--sasv-text-soft);
        font-weight: 700;
        opacity: 0.82;
      }
      [data-theme="dark"] #brand-name .brand-workspace {
        color: #e5e7eb;
        opacity: 0.85;
      }
      #appVersion {
        font-size: 10.5px;
        color: #8a5a00;
        font-weight: 700;
        letter-spacing: 0.06em;
        background: #fff7df;
        border: 1px solid #f2d68a;
        border-radius: 999px;
        padding: 2px 8px;
        display: inline-block;
        width: fit-content;
      }
      [data-theme="dark"] #appVersion {
        background: rgba(245, 166, 35, 0.12);
        border-color: rgba(245, 166, 35, 0.24);
        color: #f7c56b;
      }

      #header-search-slot {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        min-width: 0;
      }

      #user-zone {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
        margin-left: auto;
      }

      #presence-chip {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        background: var(--sasv-surface-soft);
        border: 1px solid var(--sasv-border);
        border-radius: 999px;
        overflow: visible;
        box-shadow: var(--sasv-shadow-sm);
      }
      #presence-label {
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--sasv-muted);
        white-space: nowrap;
      }
      #userInfo {
        padding: 0;
        font-size: 12px;
        font-weight: 700;
        color: var(--sasv-text-soft);
        white-space: nowrap;
        max-width: 230px;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #onlineUsersCount {
        font-size: 11px;
        font-weight: 700;
        color: var(--sasv-text-soft);
        background: var(--sasv-surface);
        border: 1px solid var(--sasv-border);
        border-radius: 999px;
        padding: 4px 8px;
        white-space: nowrap;
      }
      #user-chip {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px 6px 6px;
        background: var(--sasv-surface);
        border: 1px solid var(--sasv-border);
        border-radius: 999px;
        box-shadow: var(--sasv-shadow-sm);
      }
      #userAvatar {
        width: 28px;
        height: 28px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 11px;
        font-weight: 800;
        color: #fff;
        background: var(--avatar-bg, #005a8d);
        box-shadow: 0 1px 6px rgba(15, 23, 42, 0.14);
      }
      #logoutLink {
        background: linear-gradient(180deg, #fff7f7, #fff1f1);
        border: 1px solid rgba(220, 38, 38, 0.16);
        border-radius: 999px;
        padding: 7px 12px;
        font-size: 11.5px;
        font-weight: 700;
        color: #b42318;
        cursor: pointer;
        white-space: nowrap;
        transition:
          background 0.15s ease,
          border-color 0.15s ease,
          box-shadow 0.15s ease;
        font-family: inherit;
      }
      #logoutLink:hover {
        background: #fff0f0;
        border-color: rgba(220, 38, 38, 0.32);
        box-shadow: 0 1px 6px rgba(220, 38, 38, 0.08);
      }
      #logoutLink:focus {
        outline: 3px solid rgba(220, 38, 38, 0.14);
        outline-offset: 2px;
      }
      [data-theme="dark"] #userInfo {
        color: #e5e7eb;
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.1);
      }
      [data-theme="dark"] #logoutLink {
        background: rgba(255, 255, 255, 0.05);
        color: #fca5a5;
        border-color: rgba(248, 113, 113, 0.22);
      }
      [data-theme="dark"] #logoutLink:hover {
        background: rgba(248, 113, 113, 0.1);
      }

      .online-bubble {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 30px;
        padding: 0;
        border-radius: 999px;
        background: var(--bubble-bg, #3b82f6);
        color: #fff;
        font-size: 11px;
        font-weight: 700;
        position: relative;
        cursor: default;
        user-select: none;
        border: 1px solid rgba(255, 255, 255, 0.9);
        margin-left: 0;
        box-shadow: 0 2px 8px rgba(15, 23, 42, 0.16);
        overflow: visible;
      }
      .online-bubble .bubble-initials {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.16);
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.02em;
        flex-shrink: 0;
      }
      [data-theme="dark"] .online-bubble {
        border-color: #2a2a2a;
      }
      .online-bubble .tooltip {
        position: absolute;
        top: calc(100% + 8px);
        left: 50%;
        transform: translateX(-50%);
        background: #0f172a;
        color: #fff;
        padding: 7px 10px;
        border-radius: 10px;
        white-space: nowrap;
        font-size: 11px;
        line-height: 1.35;
        visibility: hidden;
        opacity: 0;
        z-index: 600;
        transition:
          opacity 0.12s ease,
          transform 0.12s ease;
        pointer-events: none;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        min-width: 160px;
        text-align: left;
      }
      .online-bubble:hover .tooltip {
        visibility: visible;
        opacity: 1;
      }
      #onlineUsersContainer {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      main#workspace-sections {
        max-width: 1320px;
        margin: 0 auto;
        padding: 24px 28px 40px;
      }

      #workspace-activity-band {
        max-width: 1320px;
        margin: 0 auto;
        padding: 14px 28px 0;
      }

      #workspace-activity-band {
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      .workspace-stat {
        background: transparent;
        border: none;
        border-radius: 0;
        padding: 2px 18px 2px 0;
        box-shadow: none;
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-height: 0;
        min-width: 0;
      }

      .workspace-stat + .workspace-stat {
        margin-left: 18px;
        padding-left: 18px;
        border-left: 1px solid rgba(15, 23, 42, 0.08);
      }

      .workspace-stat-label {
        font-size: 0.66rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #6b7b8c;
      }

      .workspace-stat-value {
        font-size: 1rem;
        font-weight: 800;
        line-height: 1.1;
        color: var(--sasv-text);
      }

      .workspace-stat-note {
        font-size: 0.72rem;
        color: var(--sasv-muted);
        line-height: 1.25;
      }

      #workspace-quick-access {
        position: relative;
        overflow: hidden;
        background: #e6f0f7;
        border: 1px solid rgba(73, 114, 146, 0.3);
        border-radius: 14px;
        box-shadow:
          0 8px 18px rgba(15, 23, 42, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.55);
        padding: 12px;
      }

      #workspace-quick-access::before {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        height: 4px;
        background: linear-gradient(90deg, #2f6f98, #5a8fb4);
      }

      .workspace-band-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 10px;
        padding: 2px 2px 10px;
        border-bottom: 1px solid rgba(73, 114, 146, 0.22);
      }

      .workspace-band-title {
        margin: 0;
        font-size: 0.9rem;
        font-weight: 800;
        color: #153e5b;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .workspace-band-note {
        margin: 3px 0 0;
        font-size: 0.74rem;
        color: #4d6579;
      }

      .workspace-band-meta {
        font-size: 0.67rem;
        font-weight: 600;
        color: #325874;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(73, 114, 146, 0.24);
        border-radius: 999px;
        padding: 3px 8px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .workspace-suggestion {
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin: 0 0 10px;
        padding: 8px 10px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px dashed rgba(49, 96, 127, 0.28);
      }

      .workspace-suggestion.show {
        display: flex;
      }

      .workspace-suggestion-copy {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .workspace-suggestion-label {
        font-size: 0.69rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: #0f5d85;
      }

      .workspace-suggestion-text {
        font-size: 0.77rem;
        color: var(--sasv-text-soft);
        line-height: 1.25;
      }

      .workspace-suggestion-actions {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
      }

      .workspace-suggestion-btn {
        min-height: 30px;
        padding: 0 10px;
        border-radius: 999px;
        border: 1px solid rgba(0, 90, 141, 0.18);
        background: rgba(255, 255, 255, 0.88);
        color: #0f5d85;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        cursor: pointer;
      }

      .workspace-suggestion-btn:hover {
        background: rgba(0, 90, 141, 0.08);
      }

      .workspace-suggestion-btn.subtle {
        border-color: rgba(15, 23, 42, 0.08);
        color: #697b8d;
      }

      #workspace-quick-links {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 8px;
      }

      .workspace-shortcut-wrap {
        display: block;
        position: relative;
        min-width: 0;
      }

      .workspace-shortcut {
        display: flex;
        align-items: center;
        gap: 10px;
        position: relative;
        overflow: hidden;
        min-height: 48px;
        padding: 9px 40px 9px 11px;
        border-radius: 10px;
        border: 1px solid var(--identity-border, rgba(15, 23, 42, 0.1));
        background: rgba(255, 255, 255, 0.92);
        text-decoration: none;
        color: var(--sasv-text-soft);
        box-shadow: 0 1px 5px rgba(15, 23, 42, 0.05);
        transition:
          transform 0.12s ease,
          box-shadow 0.14s ease,
          background 0.14s ease,
          border-color 0.14s ease,
          color 0.14s ease;
        flex: 1;
        min-width: 0;
      }

      .workspace-shortcut::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: var(--identity-color, var(--sasv-primary));
        opacity: 0.7;
      }

      .workspace-shortcut:hover {
        transform: translateY(-1px);
        background: #ffffff;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.1);
        border-color: var(--identity-hover-border, rgba(0, 90, 141, 0.32));
        color: var(--identity-color, var(--sasv-primary));
        text-decoration: none;
      }

      .workspace-shortcut:focus-visible {
        outline: 3px solid rgba(0, 90, 141, 0.18);
        outline-offset: 2px;
      }

      .workspace-shortcut-initial {
        flex-shrink: 0;
        width: 28px;
        height: 28px;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 800;
        background: var(--identity-bg, rgba(0, 90, 141, 0.12));
        color: var(--identity-color, var(--sasv-primary));
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.45);
      }

      .workspace-shortcut-copy {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
        max-width: 220px;
      }

      .workspace-shortcut-title {
        font-size: 0.81rem;
        font-weight: 700;
        color: inherit;
        line-height: 1.15;
      }

      .workspace-shortcut-meta {
        font-size: 0.68rem;
        color: #5f7283;
        line-height: 1.2;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      .workspace-shortcut-pin {
        position: absolute;
        right: 8px;
        top: 50%;
        width: 24px;
        height: 24px;
        padding: 0;
        border-radius: 999px;
        border: 1px solid rgba(49, 96, 127, 0.2);
        background: rgba(255, 255, 255, 0.82);
        color: #56728a;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transform: translateY(-50%);
        z-index: 2;
        transition:
          border-color 0.14s ease,
          background 0.14s ease,
          color 0.14s ease,
          box-shadow 0.14s ease,
          transform 0.12s ease;
      }

      .workspace-shortcut-pin svg {
        width: 12px;
        height: 12px;
        stroke-width: 2;
        fill: currentColor;
      }

      .workspace-shortcut-pin:hover {
        border-color: rgba(0, 90, 141, 0.3);
        background: rgba(0, 90, 141, 0.1);
        color: #0f5d85;
        transform: translateY(calc(-50% - 1px));
      }

      .workspace-shortcut-pin[aria-pressed="true"] {
        border-color: rgba(0, 90, 141, 0.3);
        background: rgba(0, 90, 141, 0.1);
        color: #0f5d85;
      }

      .workspace-shortcut-pin:focus-visible {
        outline: 3px solid rgba(0, 90, 141, 0.18);
        outline-offset: 1px;
      }

      .workspace-quick-empty {
        border: 1px dashed rgba(49, 96, 127, 0.28);
        background: rgba(255, 255, 255, 0.62);
        border-radius: 10px;
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .workspace-quick-empty-title {
        font-size: 0.74rem;
        font-weight: 800;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #1d4663;
      }

      .workspace-quick-empty-value {
        font-size: 0.95rem;
        font-weight: 800;
        color: #173d59;
      }

      .workspace-quick-empty-note {
        font-size: 0.74rem;
        color: #5d7385;
      }

      .cmd-result-main {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        flex: 1;
      }

      .cmd-result-copy {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .cmd-result-title {
        font-size: 0.9rem;
        font-weight: 600;
        line-height: 1.2;
        color: inherit;
      }

      .cmd-result-meta {
        font-size: 0.71rem;
        color: #7b8ea0;
        line-height: 1.2;
      }

      .cmd-result-pin {
        min-height: 28px;
        width: 28px;
        padding: 0;
        border-radius: 999px;
        border: 1px solid rgba(15, 23, 42, 0.08);
        background: rgba(255, 255, 255, 0.9);
        color: #60788c;
        cursor: pointer;
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .cmd-result-pin svg {
        width: 13px;
        height: 13px;
        stroke-width: 2;
        fill: transparent;
      }

      .cmd-result-pin:hover {
        border-color: rgba(0, 90, 141, 0.22);
        background: rgba(0, 90, 141, 0.06);
        color: var(--sasv-primary);
      }

      .cmd-result-pin[aria-pressed="true"] {
        border-color: rgba(0, 90, 141, 0.28);
        background: rgba(0, 90, 141, 0.08);
        color: var(--sasv-primary);
      }

      .cmd-result-pin[aria-pressed="true"] svg {
        fill: currentColor;
      }

      .section-hint {
        margin: 0 0 14px;
        font-size: 0.82rem;
        color: var(--sasv-muted);
        line-height: 1.45;
      }

      /* Placeholder (coming-soon) links */
      .module-link[aria-disabled="true"] {
        pointer-events: auto;
        text-decoration: none;
        cursor: not-allowed;
      }

      .locked-module {
        pointer-events: auto;
        text-decoration: none;
        cursor: not-allowed;
        position: relative;
      }

      #module-search-wrapper {
        width: 100%;
        max-width: 430px;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        pointer-events: auto;
        margin: 0;
      }
      #module-search-container {
        width: 100%;
        display: flex;
        align-items: center;
        background: var(--sasv-surface-soft);
        border: 1px solid rgba(15, 23, 42, 0.1);
        border-radius: 999px;
        transition:
          border-color 0.15s ease,
          box-shadow 0.15s ease,
          background 0.15s ease;
        overflow: hidden;
      }
      #module-search-container:focus-within {
        border-color: rgba(0, 90, 141, 0.45);
        background: var(--sasv-surface);
        box-shadow: 0 0 0 4px rgba(0, 90, 141, 0.08);
      }
      #module-search-icon {
        flex-shrink: 0;
        width: 38px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #7893a6;
        height: 38px;
      }
      #moduleSearch {
        flex: 1;
        padding: 9px 6px 9px 0;
        border: none;
        outline: none;
        font-size: 13px;
        font-weight: 500;
        color: var(--sasv-text);
        background: transparent;
        min-width: 0;
      }
      #moduleSearch::placeholder {
        color: #9aaebe;
      }
      #module-search-kbd {
        display: flex;
        align-items: center;
        gap: 3px;
        padding: 0 12px 0 6px;
        flex-shrink: 0;
        pointer-events: none;
      }
      .kbd-key {
        display: inline-flex;
        align-items: center;

      /* ── Command Palette Overlay ── */
      #cmd-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.45);
        backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
        z-index: 9000;
        align-items: flex-start;
        justify-content: center;
        padding-top: 12vh;
      }
      #cmd-backdrop.open {
        display: flex;
      }
      #cmd-palette {
        width: 92%;
        max-width: 600px;
        background: #fff;
        border-radius: 18px;
        box-shadow:
          0 24px 70px rgba(15, 23, 42, 0.24),
          0 4px 18px rgba(15, 23, 42, 0.08);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        animation: cmdSlideIn 0.15s ease;
        border: 1px solid rgba(15, 23, 42, 0.08);
      }
      @keyframes cmdSlideIn {
        from {
          opacity: 0;
          transform: translateY(-12px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      #cmd-search-row {
        display: flex;
        align-items: center;
        border-bottom: 1px solid rgba(15, 23, 42, 0.08);
        padding: 0 16px;
        gap: 12px;
      }
      #cmd-search-row svg {
        flex-shrink: 0;
        color: #005a8d;
      }
      #cmdPaletteInput {
        flex: 1;
        border: none;
        outline: none;
        font-size: 16px;
        font-weight: 500;
        color: #1e293b;
        padding: 16px 0;
        background: transparent;
      }
      #cmdPaletteInput::placeholder {
        color: #94a3b8;
        font-weight: 400;
      }
      #cmd-esc-hint {
        font-size: 11px;
        color: #94a3b8;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      #cmd-results {
        max-height: 360px;
        overflow-y: auto;
        padding: 6px 0;
      }
      #cmd-results:empty::after {
        content: "No modules found";
        display: block;
        text-align: center;
        padding: 24px;
        color: #94a3b8;
        font-size: 14px;
      }
      .cmd-result-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 18px;
        cursor: pointer;
        font-size: 14px;
        color: #1e293b;
        border-radius: 0;
        transition:
          background 0.08s ease,
          color 0.08s ease;
      }
      .cmd-result-item:hover,
      .cmd-result-item.active {
        background: #f1f7fb;
        color: #005a8d;
      }
      .cmd-result-item.active {
        background: #e6f2f8;
      }
      .cmd-result-item svg {
        flex-shrink: 0;
        opacity: 0.45;

        gap: 16px;
        font-size: 11px;
        color: #94a3b8;

    <script>
      // Module search helper
      (function () {
        const input = document.getElementById("moduleSearch");
        const list = document.getElementById("module-list-datalist");

        function buildIndex() {
          // Gather visible module links and build a simple index of {label, href, id}
          const anchors = Array.from(document.querySelectorAll("a.module-link"))
            .filter((a) => a.style.display !== "none")
            .map((a) => ({
              label: (
                a.querySelector(".ml-label")?.textContent ||
                a.textContent ||
                a.innerText ||
                ""
              ).trim(),
              href: a.getAttribute("href"),
              id: a.dataset.moduleId || "",
              disabled: a.getAttribute("aria-disabled") === "true",
            }))
            .filter((a) => a.label);

          // Clear datalist
          list.innerHTML = "";

          // Add options: value uses label, we encode href and id in data-attrs via value marker
          anchors.forEach((a) => {
            const opt = document.createElement("option");
            opt.value = a.label;
            // store a JSON payload on dataset to retrieve later
            opt.dataset.payload = JSON.stringify({
              href: a.href,
              id: a.id,
              disabled: a.disabled,
            });
            list.appendChild(opt);
          });

          // also expose the index for more advanced matching
          input._moduleIndex = anchors;
        }

        function findBest(label) {
          if (!label) return null;
          const idx = input._moduleIndex || [];
          const q = label.trim().toLowerCase();
          // exact match first
          let hit = idx.find((x) => x.label.toLowerCase() === q);
          if (hit) return hit;
          // prefix match
          hit = idx.find((x) => x.label.toLowerCase().startsWith(q));
          if (hit) return hit;
          // substring match
          hit = idx.find((x) => x.label.toLowerCase().includes(q));
          return hit || null;
        }

        function navigateToModuleByLabel(label) {
          const hit = findBest(label);
          if (!hit) return false;
          if (hit.disabled) return false;
          // navigate: if href starts with http/ or / treat as absolute, else relative
          window.location.href = hit.href;
          return true;
        }

        // Rebuild on DOMContentLoaded and when permissions hide/show modules
        window.addEventListener("DOMContentLoaded", buildIndex);
        // observe the workspace shell so dynamically rendered sections are indexed
        const observer = new MutationObserver(() => buildIndex());
        const workspaceRoot = document.getElementById("workspace-sections");
        if (workspaceRoot) {
          observer.observe(workspaceRoot, { childList: true, subtree: true });
        }

        // Key handling: Enter navigates
        input?.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            const v = input.value || "";
            if (!v) return;
            navigateToModuleByLabel(v);
          }
        });

        // When user selects an option from the datalist, the input value will
        // equal one of the indexed labels; detect that and navigate immediately.
        input?.addEventListener("input", (e) => {
          const v = (input.value || "").trim();
          if (!v) return;
          const idx = input._moduleIndex || [];
          const exact = idx.find(
            (x) => x.label.toLowerCase() === v.toLowerCase(),
          );
          if (exact && !exact.disabled) {
            // small delay to allow browser selection to finalize
            setTimeout(() => navigateToModuleByLabel(v), 0);
          }
        });

        // Go button removed — navigation handled on selection/Enter

        // Optional: open datalist options on focus
        input?.addEventListener("focus", () =>
          input.setAttribute("list", "module-list-datalist"),
        );

        // ── Command Palette ──
        const backdrop = document.getElementById("cmd-backdrop");
        const palette = document.getElementById("cmd-palette");
        const cmdInput = document.getElementById("cmdPaletteInput");
        const cmdResults = document.getElementById("cmd-results");
        let activeIdx = -1;

        const getPinnedModulesSafe = () => {
          if (typeof window.__getPinnedModules === "function") {
            const list = window.__getPinnedModules();
            return Array.isArray(list) ? list : [];
          }
          return [];
        };

        const normalizeModuleKeySafe = (value) => {
          if (typeof window.__normalizeModuleKey === "function") {
            return window.__normalizeModuleKey(value || "");
          }
          return String(value || "")
            .trim()
            .toLowerCase();
        };

        const togglePinnedModuleSafe = (value) => {
          if (typeof window.__togglePinnedModule === "function") {
            return window.__togglePinnedModule(value);
          }
          return false;
        };

        const refreshWorkspaceChromeSafe = () => {
          if (typeof window.__refreshWorkspaceChrome === "function") {
            window.__refreshWorkspaceChrome();
          }
        };

        function openPalette() {
          backdrop.classList.add("open");
          cmdInput.value = "";
          activeIdx = -1;
          renderCmdResults("");
          cmdInput.focus();
        }
        function closePalette() {
          backdrop.classList.remove("open");
          activeIdx = -1;
        }

        function renderCmdResults(q) {
          const idx = input._moduleIndex || [];
          const qLow = q.trim().toLowerCase();
          const filtered = qLow
            ? idx.filter(
                (x) => !x.disabled && x.label.toLowerCase().includes(qLow),
              )
            : idx.filter((x) => !x.disabled).slice(0, 20);
          const pinnedSet = new Set(getPinnedModulesSafe());

          cmdResults.innerHTML = "";
          activeIdx = -1;
          filtered.forEach((item, i) => {
            const div = document.createElement("div");
            div.className = "cmd-result-item";
            div.dataset.href = item.href;
            const isPinned = pinnedSet.has(
              normalizeModuleKeySafe(item.id || item.label),
            );
            const anchor = document.querySelector(
              `#workspace-sections a.module-link[data-module-id="${CSS.escape(item.id || "")}"]`,
            );
            const sectionTitle =
              anchor?.closest(".panel")?.querySelector("h2")?.textContent ||
              "Workspace";
            div.innerHTML = `<div class="cmd-result-main"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><div class="cmd-result-copy"><span class="cmd-result-title">${item.label}</span><span class="cmd-result-meta">${sectionTitle}</span></div></div><button type="button" class="cmd-result-pin" data-module-id="${item.id}" aria-pressed="${isPinned ? "true" : "false"}" title="${isPinned ? "Unpin from Quick Access" : "Pin to Quick Access"}" aria-label="${isPinned ? "Unpin from Quick Access" : "Pin to Quick Access"}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l3.2 4.8 5.6 1.5-3.6 4.6.3 6-5.5-2.2-5.5 2.2.3-6-3.6-4.6 5.6-1.5z"/></svg></button>`;
            div.addEventListener("mousedown", (e) => {
              if (e.target.closest(".cmd-result-pin")) return;
              e.preventDefault();
              closePalette();
              window.location.href = item.href;
            });
            const pinButton = div.querySelector(".cmd-result-pin");
            pinButton?.addEventListener("mousedown", (e) => {
              e.preventDefault();
              e.stopPropagation();
            });
            pinButton?.addEventListener("click", (e) => {
              e.preventDefault();
              e.stopPropagation();
              const nextState = togglePinnedModuleSafe(item.id || item.label);
              pinButton.setAttribute(
                "aria-pressed",
                nextState ? "true" : "false",
              );
              const title = nextState
                ? "Unpin from Quick Access"
                : "Pin to Quick Access";
              pinButton.setAttribute("title", title);
              pinButton.setAttribute("aria-label", title);
              refreshWorkspaceChromeSafe();
            });
            div.addEventListener("mouseenter", () => setActive(i));
            cmdResults.appendChild(div);
          });
        }

        function setActive(i) {
          const items = cmdResults.querySelectorAll(".cmd-result-item");
          items.forEach((el) => el.classList.remove("active"));
          if (i >= 0 && i < items.length) {
            items[i].classList.add("active");
            items[i].scrollIntoView({ block: "nearest" });
            activeIdx = i;
          }
        }

        cmdInput?.addEventListener("input", () => {
          renderCmdResults(cmdInput.value);
        });

        cmdInput?.addEventListener("keydown", (e) => {
          const items = cmdResults.querySelectorAll(".cmd-result-item");
          if (e.key === "ArrowDown") {
            e.preventDefault();
            setActive(Math.min(activeIdx + 1, items.length - 1));
          } else if (e.key === "ArrowUp") {
            e.preventDefault();
            setActive(Math.max(activeIdx - 1, 0));
          } else if (e.key === "Enter") {
            e.preventDefault();
            const active = cmdResults.querySelector(".cmd-result-item.active");
            if (active) {
              closePalette();
              window.location.href = active.dataset.href;
            } else if (items.length === 1) {
              closePalette();
              window.location.href = items[0].dataset.href;
            }
          } else if (e.key === "Escape") {
            closePalette();
          }
        });

        // Close on backdrop click (outside palette)
        backdrop?.addEventListener("mousedown", (e) => {
          if (!palette.contains(e.target)) closePalette();
        });

        // Global Ctrl+K shortcut — opens floating palette
        document.addEventListener("keydown", (e) => {
          if ((e.ctrlKey || e.metaKey) && e.key === "k") {
            e.preventDefault();
            openPalette();
          } else if (
            e.key === "Escape" &&
            backdrop.classList.contains("open")
          ) {
            closePalette();
          }
        });

        // Expose for permission-gating code to trigger a re-index after
        // display:none is applied (attribute mutations are not observed).
        window._rebuildModuleIndex = buildIndex;
      })();
    </script>
    <script type="module" src="public/shared/js/supabaseClient.js"></script>
    <script type="module">
      import { supabase } from "./public/shared/js/supabaseClient.js";
      import {

      window.supabase = supabase;

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;");
      }

      const workspaceRoot = document.getElementById("workspace-sections");
      const quickLinksRoot = document.getElementById("workspace-quick-links");
      const workspaceBandMeta = document.getElementById("workspace-band-meta");
      const workspaceBandNote = document.getElementById("workspace-band-note");
      const workspaceSuggestion = document.getElementById(
        "workspace-suggestion",
      );
      let workspaceStorageScope = "guest";
      let workspaceUserLabel = "your";

      function buildWorkspaceStorageKey(suffix) {
        return `sasv-workspace:${workspaceStorageScope}:${suffix}`;
      }

      function setWorkspaceUserScope(user) {
        const rawScope =
          normalizeModuleKey(user?.id || user?.email || "guest") || "guest";
        workspaceStorageScope = rawScope;
        workspaceUserLabel = user?.email || "your";
      }

      function readStoredModuleList(suffix) {
        try {
          const parsed = JSON.parse(
            window.localStorage.getItem(buildWorkspaceStorageKey(suffix)) ||
              "[]",
          );
          return Array.isArray(parsed)
            ? parsed.filter(Boolean).map((value) => String(value))
            : [];
        } catch {
          return [];
        }
      }

      function readRecentModules() {
        return readStoredModuleList("recent-modules");
      }

      function readPinnedModules() {
        return readStoredModuleList("pinned-modules");
      }

      function readUsageStats() {
        try {
          return JSON.parse(
            window.localStorage.getItem(
              buildWorkspaceStorageKey("usage-stats"),
            ) || "{}",
          );
        } catch {
          return {};
        }
      }

      function writeUsageStats(stats) {
        try {
          window.localStorage.setItem(
            buildWorkspaceStorageKey("usage-stats"),
            JSON.stringify(stats),
          );
        } catch {
          // ignore storage failures
        }
      }

      function readDismissedSuggestion() {
        try {
          return String(
            window.localStorage.getItem(
              buildWorkspaceStorageKey("dismissed-suggestion"),
            ) || "",
          );
        } catch {
          return "";
        }
      }

      function writeDismissedSuggestion(moduleKey) {
        try {
          window.localStorage.setItem(
            buildWorkspaceStorageKey("dismissed-suggestion"),
            moduleKey || "",
          );
        } catch {
          // ignore storage failures
        }
      }

      function writeStoredModuleList(suffix, items, limit = 8) {
        try {
          window.localStorage.setItem(
            buildWorkspaceStorageKey(suffix),
            JSON.stringify(items.slice(0, limit)),
          );
        } catch {
          // ignore storage failures
        }
      }

      function writeRecentModules(items) {
        writeStoredModuleList("recent-modules", items, 8);
      }

      function writePinnedModules(items) {
        writeStoredModuleList("pinned-modules", items, 10);
      }

      function rememberRecentModule(moduleKey) {
        const normalized = normalizeModuleKey(moduleKey || "");
        if (!normalized) return;
        const next = [
          normalized,
          ...readRecentModules().filter((item) => item !== normalized),
        ];
        writeRecentModules(next);
      }

      function trackModuleUsage(moduleKey) {
        const normalized = normalizeModuleKey(moduleKey || "");
        if (!normalized) return;
        const stats = readUsageStats();
        const current = stats[normalized] || { count: 0, lastUsedAt: 0 };
        stats[normalized] = {
          count: Number(current.count || 0) + 1,
          lastUsedAt: Date.now(),
        };
        writeUsageStats(stats);
      }

      function togglePinnedModule(moduleKey) {
        const normalized = normalizeModuleKey(moduleKey || "");
        if (!normalized) return false;
        const current = readPinnedModules();
        if (current.includes(normalized)) {
          writePinnedModules(current.filter((item) => item !== normalized));
          return false;
        }
        writePinnedModules([
          normalized,
          ...current.filter((item) => item !== normalized),
        ]);
        return true;

      // Bridge helpers for the non-module Ctrl+K script.
      window.__getPinnedModules = readPinnedModules;
      window.__togglePinnedModule = togglePinnedModule;
      window.__normalizeModuleKey = normalizeModuleKey;

      function getVisibleWorkspaceAnchors() {
        return Array.from(
          document.querySelectorAll("#workspace-sections a.module-link"),
        ).filter((anchor) => anchor.style.display !== "none");
      }

      function syncWorkspacePanels() {
        document
          .querySelectorAll("#workspace-sections .panel")
          .forEach((panel) => {
            if (panel.dataset.statusPanel === "true") {
              panel.style.display = "";
              return;
            }
            const hasVisibleLinks = Array.from(
              panel.querySelectorAll("a.module-link"),
            ).some((anchor) => anchor.style.display !== "none");
            panel.style.display = hasVisibleLinks ? "" : "none";
          });
      }

      function getSuggestionCandidate(candidates) {
        const pinnedKeys = new Set(readPinnedModules());
        const dismissed = readDismissedSuggestion();
        const stats = readUsageStats();
        const scored = candidates
          .map((anchor) => {
            const moduleKey = normalizeModuleKey(anchor.dataset.moduleId || "");
            const usage = stats[moduleKey] || { count: 0, lastUsedAt: 0 };
            return {
              anchor,
              moduleKey,
              score:
                Number(usage.count || 0) * 10 +
                Number(usage.lastUsedAt || 0) / 1_000_000_000_000,
              count: Number(usage.count || 0),
            };
          })
          .filter((item) => item.moduleKey && !pinnedKeys.has(item.moduleKey))
          .filter((item) => item.moduleKey !== dismissed)
          .sort((left, right) => right.score - left.score);
        return scored.find((item) => item.count > 0) || null;
      }

      function renderWorkspaceSuggestion(candidates) {
        if (!workspaceSuggestion) return;
        const suggestion = getSuggestionCandidate(candidates);
        if (!suggestion) {
          workspaceSuggestion.classList.remove("show");
          workspaceSuggestion.innerHTML = "";
          return;
        }
        const label =
          suggestion.anchor.dataset.moduleLabel ||
          suggestion.anchor.querySelector(".ml-label")?.textContent ||
          suggestion.moduleKey;
        workspaceSuggestion.classList.add("show");
        workspaceSuggestion.innerHTML = `<div class="workspace-suggestion-copy"><span class="workspace-suggestion-label">Suggested Shortcut</span><span class="workspace-suggestion-text">You use ${escapeHtml(label.trim())} often. Add it to Quick Access only if you want it there.</span></div><div class="workspace-suggestion-actions"><button type="button" class="workspace-suggestion-btn" data-action="add" data-module-id="${escapeHtml(suggestion.moduleKey)}">Add</button><button type="button" class="workspace-suggestion-btn subtle" data-action="dismiss" data-module-id="${escapeHtml(suggestion.moduleKey)}">Not Now</button></div>`;
      }

      function renderQuickAccess() {
        if (!quickLinksRoot) return;
        const candidates = getVisibleWorkspaceAnchors().filter((anchor) => {
          const href =
            anchor.dataset.href || anchor.getAttribute("href") || "#";
          return (
            anchor.getAttribute("aria-disabled") !== "true" && href !== "#"
          );
        });
        const lookup = new Map(
          candidates.map((anchor) => [
            normalizeModuleKey(anchor.dataset.moduleId || ""),
            anchor,
          ]),
        );
        const pinnedKeys = readPinnedModules();
        const pinnedItems = pinnedKeys
          .map((moduleKey) => lookup.get(moduleKey))
          .filter(Boolean);
        const shortcuts = pinnedItems;

        workspaceBandMeta.textContent = shortcuts.length
          ? `${pinnedItems.length} pinned in your panel`
          : "Pin modules from Ctrl + K to build this panel";

        if (workspaceBandNote) {
          workspaceBandNote.textContent = `Quick Access is personal to ${workspaceUserLabel} and only shows modules you pin.`;
        }

        renderWorkspaceSuggestion(candidates);

        if (!shortcuts.length) {
          quickLinksRoot.innerHTML =
            '<div class="workspace-quick-empty"><span class="workspace-quick-empty-title">Quick Access</span><strong class="workspace-quick-empty-value">No pinned modules</strong><span class="workspace-quick-empty-note">Use Ctrl + K and pin the modules you want to keep close.</span></div>';
          return;
        }

        quickLinksRoot.innerHTML = shortcuts
          .map((anchor) => {
            const computed = window.getComputedStyle(anchor);
            const label =
              anchor.dataset.moduleLabel ||
              anchor.querySelector(".ml-label")?.textContent ||
              anchor.textContent ||
              "Module";
            const href =
              anchor.dataset.href || anchor.getAttribute("href") || "#";
            const initial =
              anchor.dataset.initial || label.trim().charAt(0).toUpperCase();
            const moduleId = normalizeModuleKey(
              anchor.dataset.moduleId || label,
            );

            return `<div class="workspace-shortcut-wrap" style="--identity-color:${escapeHtml(computed.getPropertyValue("--identity-color").trim() || "#005a8d")};--identity-bg:${escapeHtml(computed.getPropertyValue("--identity-bg").trim() || "rgba(0, 90, 141, 0.12)")};--identity-border:${escapeHtml(computed.getPropertyValue("--identity-border").trim() || "rgba(0, 90, 141, 0.28)")};--identity-hover-border:${escapeHtml(computed.getPropertyValue("--identity-hover-border").trim() || "rgba(0, 90, 141, 0.4)")};"><a class="workspace-shortcut" href="${escapeHtml(href)}" data-module-id="${escapeHtml(moduleId)}"><span class="workspace-shortcut-initial" aria-hidden="true">${escapeHtml(initial)}</span><span class="workspace-shortcut-copy"><span class="workspace-shortcut-title">${escapeHtml(label.trim())}</span></span></a><button type="button" class="workspace-shortcut-pin" data-action="unpin" data-module-id="${escapeHtml(moduleId)}" aria-label="Unpin ${escapeHtml(label.trim())} from Quick Access" title="Unpin from Quick Access"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l3.2 4.8 5.6 1.5-3.6 4.6.3 6-5.5-2.2-5.5 2.2.3-6-3.6-4.6 5.6-1.5z"/></svg></button></div>`;
          })
          .join("");
      }

      function refreshWorkspaceChrome() {
        syncWorkspacePanels();
        renderQuickAccess();
        if (typeof window._rebuildModuleIndex === "function") {
          window._rebuildModuleIndex();
        }
      }

      window.__refreshWorkspaceChrome = refreshWorkspaceChrome;

      function buildSectionCatalogMap(sectionRows) {
        const map = new Map();
        sectionRows.forEach((section) => {
          map.set(section.key, section);
          if (section.label) {
            map.set(section.label, section);
          }
        });
        return map;
      }

      function injectLocalFallbackModules(registryRows, sectionRows) {
        const rows = Array.isArray(registryRows) ? [...registryRows] : [];
        const hasProductShelfLife = rows.some(
          (row) =>
            String(row?.moduleKey || "").toLowerCase() ===
            "product-shelf-life-manager",
        );
        const hasStaffDirectory = rows.some(
          (row) =>
            String(row?.moduleKey || "").toLowerCase() ===
            "staff-directory-manager",
        );

        const sections = Array.isArray(sectionRows) ? sectionRows : [];

        // Inject Product Shelf Life if not present
        if (!hasProductShelfLife) {
          const preferredSection =
            sections.find((section) =>
              /lims|laboratory|lab\s*master/i.test(
                `${section?.label || ""} ${section?.key || ""}`,
              ),
            ) ||
            sections.find((section) =>
              /product|reference|master/i.test(
                `${section?.label || ""} ${section?.key || ""}`,
              ),
            ) ||
            sections.find((section) =>
              /quality|qc|lab/i.test(
                `${section?.label || ""} ${section?.key || ""}`,
              ),
            ) ||
            null;

          rows.push({
            moduleKey: "product-shelf-life-manager",
            targetKey: "module:product-shelf-life-manager",
            label: "Product Shelf Life",
            description:
              "Manage product shelf-life versions used by LIMS / COA expiry logic.",
            sectionKey: preferredSection?.key || "laboratory-masters",
            sectionLabel: preferredSection?.label || "Laboratory Masters",
            sortOrder: 9998,
            minNavMode: "view",
            routePath: "public/shared/product-shelf-life-manager.html",
            clientKey: "electron",
          });
        }

        // Inject Staff Directory Manager if not present
        if (!hasStaffDirectory) {
          const hrSection =
            sections.find((section) =>
              /hr|human\s*resource|staff/i.test(
                `${section?.label || ""} ${section?.key || ""}`,
              ),
            ) ||
            sections.find((section) =>
              /admin|system|integrat/i.test(
                `${section?.label || ""} ${section?.key || ""}`,
              ),
            ) ||
            null;

          rows.push({
            moduleKey: "staff-directory-manager",
            targetKey: "module:staff-directory-manager",
            label: "Staff Directory",
            description:
              "View staff details used across workflow access, laboratory operations, and ERP modules.",
            sectionKey: hrSection?.key || "admin-masters",
            sectionLabel: hrSection?.label || "System & Admin",
            sortOrder: 9997,
            minNavMode: "view",
            routePath: "public/shared/staff-directory-manager.html",
            clientKey: "electron",
          });
        }

        return rows;
      }

      function buildWorkspaceSections(registryRows, sectionCatalog) {
        const sections = new Map();

        registryRows.forEach((row, index) => {
          const sectionMeta =
            sectionCatalog.get(row.sectionKey) ||
            sectionCatalog.get(row.sectionLabel) ||
            null;
          const sectionTitle = row.sectionLabel || "Other";
          if (!sections.has(sectionTitle)) {
            sections.set(sectionTitle, {
              title: sectionTitle,
              hint: sectionMeta?.description || "",
              order: sectionMeta?.sortOrder ?? index,
              items: [],
            });
          }

          sections.get(sectionTitle).items.push({
            moduleKey: row.moduleKey,
            targetKey: row.targetKey || `module:${row.moduleKey}`,
            label: row.label || row.moduleKey,
            routePath: row.routePath || "#",
            order: Number.isFinite(Number(row.sortOrder))
              ? Number(row.sortOrder)
              : index,
            minNavMode: row.minNavMode || "view",
            placeholder: false,
            title: "",
          });
        });

        return Array.from(sections.values())
          .sort((left, right) => left.order - right.order)
          .map((section) => ({
            ...section,
            items: section.items.sort((left, right) => {
              if (left.order !== right.order) return left.order - right.order;
              return left.label.localeCompare(right.label);
            }),
          }));
      }

      function renderWorkspaceSections(sections) {
        if (!workspaceRoot) return;
        workspaceRoot.innerHTML = "";

        function getSectionIdentity(sectionTitle) {
          const title = String(sectionTitle || "").toLowerCase();
          const hasAny = (terms) => terms.some((term) => title.includes(term));

          if (
            hasAny([
              "production",
              "manufacturing",
              "batch",
              "bmr",
              "factory",
              "workbench",
            ])
          ) {
            return "operations";
          }
          if (
            hasAny([
              "inventory",
              "stock",
              "sales",
              "forecast",
              "analytics",
              "fill",
            ])
          ) {
            return "inventory";
          }
          if (
            hasAny([
              "finance",
              "payment",
              "cost",
              "budget",
              "purchase",
              "payable",
            ])
          ) {
            return "finance";
          }
          if (hasAny(["quality", "qc", "lab", "analysis", "coa", "test"])) {
            return "quality";
          }
          if (
            hasAny([
              "admin",
              "user",
              "permission",
              "setting",
              "master",
              "configuration",
            ])
          ) {
            return "admin";
          }
          if (hasAny(["report", "dashboard", "mis", "summary"])) {
            return "reports";
          }
          return "general";
        }

        sections.forEach((section) => {
          const identity = getSectionIdentity(section.title);
          const panel = document.createElement("section");
          panel.className = `panel section-identity-${identity}`;
          panel.innerHTML =
            '<h2></h2><p class="section-hint"></p><div class="module-list"></div>';

          const heading = panel.querySelector("h2");
          const hint = panel.querySelector(".section-hint");
          const list = panel.querySelector(".module-list");
          if (heading) heading.textContent = section.title;
          if (hint) hint.textContent = section.hint || "";
          if (list) {
            const identityClass = `identity-${identity}`;
            list.innerHTML = section.items
              .map((item) => {
                const href = item.placeholder ? "#" : item.routePath || "#";
                const initial = (item.label.trim()[0] || "?").toUpperCase();
                const attrs = [
                  `class="module-link ${identityClass}"`,
                  `data-module-id="${escapeHtml(item.moduleKey)}"`,
                  `data-target-key="${escapeHtml(item.targetKey || `module:${item.moduleKey}`)}"`,
                  `data-module-label="${escapeHtml(item.label)}"`,
                  `data-min-nav-mode="${escapeHtml(item.minNavMode || "view")}"`,
                  `data-placeholder="${item.placeholder ? "true" : "false"}"`,
                  `data-initial="${escapeHtml(initial)}"`,
                ];
                if (!item.placeholder) {
                  attrs.push(
                    `data-href="${escapeHtml(item.routePath || "#")}"`,
                  );
                }
                if (item.placeholder) {
                  attrs.push('aria-disabled="true"');
                  if (item.title) {
                    attrs.push(`title="${escapeHtml(item.title)}"`);
                  }
                }
                return `<a ${attrs.join(" ")} href="${escapeHtml(href)}"><span class="ml-initial ${identityClass}" aria-hidden="true">${escapeHtml(initial)}</span><span class="ml-copy"><span class="ml-label">${escapeHtml(item.label)}</span><span class="ml-badge hidden" data-module-badge="true"></span></span></a>`;
              })
              .join("");
          }
          workspaceRoot.appendChild(panel);
        });
      }

      function renderWorkspaceStatus(title, message) {
        if (!workspaceRoot) return;
        workspaceRoot.innerHTML = "";

        const panel = document.createElement("section");
        panel.className = "panel";
        panel.dataset.statusPanel = "true";
        panel.innerHTML =
          '<h2></h2><p class="section-hint"></p><div class="module-list"></div>';

        const heading = panel.querySelector("h2");
        const hint = panel.querySelector(".section-hint");
        const list = panel.querySelector(".module-list");
        if (heading) heading.textContent = title;
        if (hint) hint.textContent = message;
        if (list) list.innerHTML = "";
        workspaceRoot.appendChild(panel);
      }

      async function renderRegistryWorkspaceMenu() {
        const [registryRows, sectionRows] = await Promise.all([
          loadClientModuleRegistry("electron"),
          loadNavigationSections(),
        ]);
        const mergedRegistryRows = injectLocalFallbackModules(
          registryRows,
          sectionRows,
        );

        if (!mergedRegistryRows.length) {
          renderWorkspaceStatus(
            "No workspace modules",
            "No Electron modules are currently registered for this client.",
          );
          return false;
        }

        const sections = buildWorkspaceSections(
          mergedRegistryRows,
          buildSectionCatalogMap(sectionRows),
        );
        renderWorkspaceSections(sections);
        return true;
      }

      function getModuleBadgeText(row) {
        if (!row || typeof row !== "object") return "";

        const directText = String(
          row.badge_text ?? row.badge_label ?? row.display_text ?? "",
        ).trim();
        if (directText) return directText;

        const rawCount = [
          row.badge_count,
          row.pending_count,
          row.total_pending,
          row.count_value,
          row.count,
        ].find((value) => value !== null && value !== undefined && value !== "");

        const numericCount = Number(rawCount);
        if (!Number.isFinite(numericCount)) return "";
        return `${numericCount} pending`;
      }

      function applyModuleBadgeRow(moduleId, row) {
        const anchor = document.querySelector(
          `#workspace-sections a.module-link[data-module-id="${CSS.escape(moduleId)}"]`,
        );
        const badgeEl = anchor?.querySelector("[data-module-badge='true']");
        if (!badgeEl) return;

        const severity = String(row?.badge_severity ?? "none")
          .trim()
          .toLowerCase();
        const badgeText = getModuleBadgeText(row);

        badgeEl.classList.remove("warn", "danger");

        if (severity === "none" || !badgeText) {
          badgeEl.textContent = "";
          badgeEl.classList.add("hidden");
          return;
        }

        badgeEl.textContent = badgeText;
        badgeEl.classList.toggle("warn", severity === "warn");
        badgeEl.classList.toggle("danger", severity === "danger");
        badgeEl.classList.remove("hidden");
      }

      async function refreshModuleBadges() {
        try {
          const { data, error } = await supabase
            .from("v_module_badges")
            .select("*")
            .eq("module_id", "lab-spec-profile-manager")
            .maybeSingle();

          if (error) {
            console.warn("Module badge load failed", error);
            return;
          }

          applyModuleBadgeRow("lab-spec-profile-manager", data || null);
        } catch (error) {
          console.warn("Module badge refresh failed", error);
        }
      }

      async function initApp() {
        try {
          const {
            data: { session },
          } = await supabase.auth.getSession();
          if (!session) return (window.location.href = "login.html");

          const {
            data: { user },
          } = await supabase.auth.getUser();

          const PRESENCE_REFRESH_MS = 20_000;
          const ONLINE_THRESHOLD_MS = 60_000;

          async function sendHeartbeat(actor) {
            await supabase.from("user_presence").upsert(
              {
                user_id: actor.id,
                email: actor.email,
                last_seen: new Date().toISOString(),
              },
              { onConflict: "user_id" },
            );
          }

          async function getOnlineUsers() {
            const cutoff = new Date(
              Date.now() - ONLINE_THRESHOLD_MS,
            ).toISOString();
            const { data: users, error } = await supabase
              .from("user_presence")
              .select("user_id,email,last_seen")
              .gt("last_seen", cutoff)
              .order("last_seen", { ascending: false });
            if (error) {
              console.error("Failed to fetch online users", error);
              return [];
            }
            return users || [];
          }

          function colorFromString(value) {
            let hash = 0;
            for (let index = 0; index < value.length; index += 1) {
              hash = value.charCodeAt(index) + ((hash << 5) - hash);
            }
            const hue = Math.abs(hash) % 360;
            return `hsl(${hue}, 65%, 60%)`;
          }

          function initialsFromEmail(email) {
            const name = email.split("@")[0];
            const parts = name.split(/[._-]/).filter(Boolean);
            return (
              parts.length >= 2 ? parts[0][0] + parts[1][0] : name.slice(0, 2)
            ).toUpperCase();
          }

          function renderOnlineBubbles(users) {
            const container = document.getElementById("onlineUsersContainer");
            const countEl = document.getElementById("onlineUsersCount");
            if (!container) return;
            container.innerHTML = "";
            const peers = users.filter(
              (onlineUser) => onlineUser.user_id !== user.id,
            );
            peers.forEach((onlineUser) => {
              const bubble = document.createElement("div");
              bubble.className = "online-bubble";
              const initials = initialsFromEmail(onlineUser.email || "");
              const initialsEl = document.createElement("span");
              initialsEl.className = "bubble-initials";
              initialsEl.setAttribute("aria-hidden", "true");
              initialsEl.textContent = initials;
              bubble.appendChild(initialsEl);
              bubble.style.setProperty(
                "--bubble-bg",
                colorFromString(onlineUser.email),
              );
              bubble.setAttribute(
                "aria-label",
                `Active user ${onlineUser.email || "Unknown user"}`,
              );
              const tooltip = document.createElement("div");
              tooltip.className = "tooltip";
              const lastSeen = onlineUser.last_seen
                ? new Date(onlineUser.last_seen).toLocaleString([], {
                    dateStyle: "medium",
                    timeStyle: "short",
                  })
                : "unknown";
              const tooltipStrong = document.createElement("strong");
              tooltipStrong.textContent = onlineUser.email || "Unknown user";
              const tooltipBreak = document.createElement("br");
              const tooltipSpan = document.createElement("span");
              tooltipSpan.textContent = `Last seen ${lastSeen}`;
              tooltip.appendChild(tooltipStrong);
              tooltip.appendChild(tooltipBreak);
              tooltip.appendChild(tooltipSpan);
              bubble.appendChild(tooltip);
              bubble.addEventListener("mouseenter", () => fitTooltip(tooltip));
              bubble.addEventListener("focus", () => fitTooltip(tooltip));
              container.appendChild(bubble);
              fitTooltip(tooltip);
            });
            if (countEl) {
              const peerCount = peers.length;
              countEl.textContent = peerCount
                ? `${peerCount} others`
                : "Just you";
              countEl.title = peerCount
                ? `${peerCount} other active workspace user${peerCount === 1 ? "" : "s"}`
                : "No other active users right now";
            }
            window.__workspaceOnlineCount = peers.length;
            refreshWorkspaceChrome();
          }

          function fitTooltip(tooltip) {
            const rect = tooltip.getBoundingClientRect();
            const gap = 6;
            if (rect.right > window.innerWidth) {
              const overshoot = rect.right - window.innerWidth + gap;
              tooltip.style.transform = `translateX(calc(-50% - ${overshoot}px))`;
            }
            if (rect.left < 0) {
              const overshoot = Math.abs(rect.left) + gap;
              tooltip.style.transform = `translateX(calc(-50% + ${overshoot}px))`;
            }
          }

          const userInfoEl = document.getElementById("userInfo");
          const userAvatarEl = document.getElementById("userAvatar");
          const logoutEl = document.getElementById("logoutLink");
          if (!userInfoEl || !logoutEl || !userAvatarEl) return;
          setWorkspaceUserScope(user);
          const currentEmail = String(
            user.email || session.user?.email || "",
          ).trim();
          userInfoEl.textContent = currentEmail || "Unknown user";
          userInfoEl.title = currentEmail || "Unknown user";
          const avatarInitial = currentEmail
            ? currentEmail[0].toUpperCase()
            : "?";
          userAvatarEl.textContent = avatarInitial;
          userAvatarEl.style.setProperty(
            "--avatar-bg",
            colorFromString(currentEmail || user.id || "user"),
          );

          await sendHeartbeat(user);
          setInterval(() => sendHeartbeat(user), PRESENCE_REFRESH_MS);

          async function refreshOnlineDisplay() {
            const onlineUsers = await getOnlineUsers();
            renderOnlineBubbles(onlineUsers);
          }

          refreshOnlineDisplay();
          setInterval(refreshOnlineDisplay, 30_000);

          function handleSuggestionAction(event) {
            const actionButton = event.target.closest(
              ".workspace-suggestion-btn",
            );
            if (!actionButton) return;
            event.preventDefault();
            event.stopPropagation();
            const moduleId = actionButton.dataset.moduleId || "";
            if (actionButton.dataset.action === "add") {
              const isPinned = readPinnedModules().includes(
                normalizeModuleKey(moduleId),
              );
              if (!isPinned) togglePinnedModule(moduleId);
              writeDismissedSuggestion("");
            } else {
              writeDismissedSuggestion(normalizeModuleKey(moduleId));
            }
            renderQuickAccess();
          }

          if (quickLinksRoot && !quickLinksRoot.dataset.pinBindingReady) {
            quickLinksRoot.addEventListener("click", (event) => {
              const unpinButton = event.target.closest(
                ".workspace-shortcut-pin[data-action='unpin']",
              );
              if (unpinButton) {
                event.preventDefault();
                event.stopPropagation();
                const moduleId = unpinButton.dataset.moduleId || "";
                const moduleKey = normalizeModuleKey(moduleId);
                if (moduleKey && readPinnedModules().includes(moduleKey)) {
                  togglePinnedModule(moduleId);
                }
                refreshWorkspaceChrome();
                return;
              }
            });
            quickLinksRoot.dataset.pinBindingReady = "true";
          }

          if (
            workspaceSuggestion &&
            !workspaceSuggestion.dataset.suggestionBindingReady
          ) {
            workspaceSuggestion.addEventListener(
              "click",
              handleSuggestionAction,
            );
            workspaceSuggestion.dataset.suggestionBindingReady = "true";
          }

          window.addEventListener("beforeunload", () => {
            supabase.from("user_presence").delete().eq("user_id", user.id);
          });

          logoutEl.replaceWith(logoutEl.cloneNode(true));
          const freshLogoutEl = document.getElementById("logoutLink");
          freshLogoutEl.addEventListener("click", async (event) => {
            event.preventDefault();
            await supabase
              .from("user_presence")
              .delete()
              .eq("user_id", user.id);
            await supabase.auth.signOut();
            window.location.href = "login.html";
          });

          try {
            await renderRegistryWorkspaceMenu();
          } catch (registryError) {
            console.error(
              "Failed to load Electron module registry",
              registryError,
            );
            renderWorkspaceStatus(
              "Module registry unavailable",
              "Workspace modules could not be loaded right now. Contact admin if this keeps happening.",
            );
          }

          try {
            const { data: perms, error: permsErr } = await supabase.rpc(
              "get_user_permissions",
              { p_user_id: user.id },
            );

            if (permsErr || !Array.isArray(perms)) {
              console.warn(
                "get_user_permissions failed or returned unexpected data",
                permsErr || perms,
              );
              document.querySelectorAll("a.module-link").forEach((anchor) => {
                anchor.style.display = "none";
              });
              refreshWorkspaceChrome();
            } else {
              const permissionMap = buildPermissionMap(perms);
              const moduleDecisions = [];
              document.querySelectorAll("a.module-link").forEach((anchor) => {
                const moduleKey = normalizeModuleKey(
                  anchor.dataset.moduleId || "",
                );
                const minNavMode =
                  String(anchor.dataset.minNavMode || "view").toLowerCase() ||
                  "view";
                const accessLevel = getModuleAccessLevel(
                  { moduleKey, minNavMode },
                  permissionMap,
                );
                const isPlaceholder =
                  anchor.dataset.placeholder === "true" ||
                  (anchor.getAttribute("aria-disabled") === "true" &&
                    !anchor.dataset.href);

                moduleDecisions.push({
                  moduleKey,
                  label: (anchor.textContent || "").trim(),
                  accessLevel,
                  targetKey:
                    anchor.dataset.targetKey || `module:${moduleKey}`,
                  minNavMode,
                  placeholder: isPlaceholder,
                  routePath:
                    anchor.dataset.href || anchor.getAttribute("href") || "#",
                });

                if (accessLevel === "none") {
                  anchor.style.display = isPlaceholder ? "flex" : "none";
                  return;
                }

                anchor.style.display = "flex";
                if (isPlaceholder) return;

                if (accessLevel === "use") {
                  anchor.classList.remove("locked-module", "read-only-module");
                  anchor.removeAttribute("aria-disabled");
                  anchor.title = "";
                  if (anchor.dataset.href) {
                    anchor.setAttribute("href", anchor.dataset.href);
                  }
                } else if (accessLevel === "read") {
                  if (!anchor.dataset.href) {
                    anchor.dataset.href = anchor.getAttribute("href") || "";
                  }
                  anchor.classList.remove("locked-module");
                  anchor.classList.add("read-only-module");
                  anchor.removeAttribute("aria-disabled");
                  anchor.title = "Read-only access";
                  if (anchor.dataset.href) {
                    anchor.setAttribute("href", anchor.dataset.href);
                  }
                } else if (accessLevel === "view") {
                  anchor.classList.remove("read-only-module");
                  if (!anchor.dataset.href) {
                    anchor.dataset.href = anchor.getAttribute("href") || "";
                  }
                  anchor.setAttribute("href", "#");
                  anchor.setAttribute("aria-disabled", "true");
                  anchor.classList.add("locked-module");
                  anchor.title = "View-only access (not enabled for use)";
                }
              });

              const hasGrantedModules = moduleDecisions.some(
                (item) => !item.placeholder && item.accessLevel !== "none",
              );
              if (!hasGrantedModules) {
                renderWorkspaceStatus(
                  "Account active",
                  "Your account is active. Contact an admin to activate the tools you need.",
                );
              }
              refreshWorkspaceChrome();
              await refreshModuleBadges();

              if (!window.__moduleClickGuard) {
                document.addEventListener(
                  "click",
                  (event) => {
                    const link =
                      event.target.closest &&
                      event.target.closest("a.module-link");
                    if (!link) return;
                    if (
                      link.getAttribute("aria-disabled") === "true" &&
                      link.classList.contains("locked-module")
                    ) {
                      event.preventDefault();
                      event.stopPropagation();
                      alert(
                        "This module is view-only for your account. Contact admin for full access.",
                      );
                    }
                  },
                  true,
                );
                window.__moduleClickGuard = true;
              }

              if (!window.__recentModuleTracker) {
                document.addEventListener(
                  "click",
                  (event) => {
                    const link =
                      event.target.closest &&
                      event.target.closest(
                        "a.module-link, a.workspace-shortcut",
                      );
                    if (!link) return;
                    if (link.getAttribute("aria-disabled") === "true") return;
                    const href =
                      link.getAttribute("href") || link.dataset.href || "#";
                    if (!href || href === "#") return;
                    rememberRecentModule(link.dataset.moduleId || "");
                    trackModuleUsage(link.dataset.moduleId || "");
                  },
                  true,
                );
                window.__recentModuleTracker = true;
              }
            }
          } catch (e) {
            console.warn("Permission fetch error", e);
            document.querySelectorAll("a.module-link").forEach((anchor) => {
              anchor.style.display = "none";
            });
            refreshWorkspaceChrome();
          }
        } catch (err) {
          console.error("initApp error", err);
          const userInfoEl = document.getElementById("userInfo");
          if (userInfoEl) userInfoEl.textContent = "Error loading user";
        }
      }

      window.addEventListener("DOMContentLoaded", initApp);
    </script>
    <script>
      window.addEventListener("DOMContentLoaded", async () => {
        try {
          const v = await window.electronAPI.getAppVersion();
          document.getElementById("appVersion").textContent = `v${v}`;
        } catch (err) {
          console.error("Could not obtain app version:", err);
        }
      });
    </script>
    <script type="module">
      import { initUpdaterUI } from "/public/shared/js/updater-ui.js";

      initUpdaterUI();
    </script>
  </body>
</html>
